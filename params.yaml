TrainingArguments:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  warmup_steps: 500
  weight_decay: 0.01
  logging_dir: ./logs
  logging_steps: 10
  evaluation_strategy: "steps"
  evaluation_steps: 500
  save_strategy: "steps"
  save_steps: 500
  load_best_model_at_end: true
  gradient_accumulation_steps: 16
  greater_is_better: false
  